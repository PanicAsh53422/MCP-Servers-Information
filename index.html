<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCP Servers — A Practical Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Custom Properties ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    :root {
      --bg-darkest:   #02060f;
      --bg-sidebar:   #030810;
      --bg-content:   #071020;
      --bg-bottom:    #0a1a2e;
      --border:       #0a1a30;
      --border-mid:   #0d1f38;
      --accent:       #38bdf8;
      --accent-2:     #818cf8;
      --accent-light: #7dd3fc;
      --text-primary: #e2e8f0;
      --text-mid:     #94a3b8;
      --text-muted:   #334155;
      --text-dim:     #1e3a5f;
      --font-ui:      'Inter', system-ui, sans-serif;
      --font-code:    'Fira Code', monospace;
    }

    body {
      font-family: var(--font-ui);
      font-size: 14px;
      color: var(--text-primary);
      background: var(--bg-darkest);
      min-height: 100vh;
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <div class="layout">
    <!-- sidebar and main go here in later tasks -->
  </div>
  <script>
    // JS goes here in later tasks
  </script>
</body>
</html>
